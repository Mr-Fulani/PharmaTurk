openapi: 3.0.3
info:
  title: Turk-Export API
  version: 0.1.0
  description: MVP API для интернет-магазина турецких товаров
paths:
  /api/ai/generate/:
    post:
      operationId: ai_generate_create
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/logs/:
    get:
      operationId: ai_logs_list
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIProcessingLog'
          description: ''
  /api/ai/logs/{id}/:
    get:
      operationId: ai_logs_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Лог AI обработки.
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIProcessingDetail'
          description: ''
  /api/ai/logs/{id}/approve/:
    post:
      operationId: ai_logs_approve_create
      description: Одобрить результат и применить к товару.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Лог AI обработки.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIProcessingLog'
          description: ''
  /api/ai/logs/{id}/reject/:
    post:
      operationId: ai_logs_reject_create
      description: Отклонить результат.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Лог AI обработки.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIProcessingLog'
          description: ''
  /api/ai/logs/{id}/reprocess/:
    post:
      operationId: ai_logs_reprocess_create
      description: Повторная обработка товара.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Лог AI обработки.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIProcessingLog'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIProcessingLog'
          description: ''
  /api/ai/moderation/:
    get:
      operationId: ai_moderation_list
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIModerationQueue'
          description: ''
    post:
      operationId: ai_moderation_create
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
  /api/ai/moderation/{id}/:
    get:
      operationId: ai_moderation_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
    put:
      operationId: ai_moderation_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
    patch:
      operationId: ai_moderation_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAIModerationQueue'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAIModerationQueue'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAIModerationQueue'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
    delete:
      operationId: ai_moderation_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/ai/moderation/{id}/assign/:
    post:
      operationId: ai_moderation_assign_create
      description: Назначить задачу на себя.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
  /api/ai/moderation/{id}/resolve/:
    post:
      operationId: ai_moderation_resolve_create
      description: 'Разрешить задачу: approve или reject по логу.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this ai moderation queue.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIModerationQueue'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIModerationQueue'
          description: ''
  /api/ai/process/{product_id}/:
    post:
      operationId: ai_process_create
      description: Ручной запуск обработки товара по ID в URL.
      parameters:
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/stats/:
    get:
      operationId: ai_stats_retrieve
      description: Статистика AI обработки за период.
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/templates/:
    get:
      operationId: ai_templates_list
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AITemplate'
          description: ''
    post:
      operationId: ai_templates_create
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AITemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AITemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AITemplate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITemplate'
          description: ''
  /api/ai/templates/{id}/:
    get:
      operationId: ai_templates_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this AI шаблон.
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITemplate'
          description: ''
    put:
      operationId: ai_templates_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this AI шаблон.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AITemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AITemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AITemplate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITemplate'
          description: ''
    patch:
      operationId: ai_templates_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this AI шаблон.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAITemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAITemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAITemplate'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITemplate'
          description: ''
    delete:
      operationId: ai_templates_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this AI шаблон.
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/auth/jwt/create/:
    post:
      operationId: auth_jwt_create_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWTObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JWTObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JWTObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTObtainPair'
          description: ''
  /api/auth/jwt/refresh/:
    post:
      operationId: auth_jwt_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/catalog/accessories/products:
    get:
      operationId: catalog_accessories_products_list
      description: Возвращает список аксессуаров с возможностью фильтрации
      summary: Получить список аксессуаров
      parameters:
      - in: query
        name: accessory_type
        schema:
          type: string
        description: Тип аксессуара
      - in: query
        name: brand_id
        schema:
          type: integer
        description: ID бренда
      - in: query
        name: category_slug
        schema:
          type: string
        description: Slug категории
      - in: query
        name: material
        schema:
          type: string
        description: Материал
      - in: query
        name: ordering
        schema:
          type: string
        description: Сортировка
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Поисковый запрос
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccessoryProductList'
          description: ''
  /api/catalog/accessories/products/{slug}:
    get:
      operationId: catalog_accessories_products_retrieve
      description: API для работы с аксессуарами.
      summary: Получить аксессуар по slug
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessoryProduct'
          description: ''
  /api/catalog/auto-parts/products:
    get:
      operationId: catalog_auto_parts_products_list
      description: API для работы с автозапчастями.
      summary: Получить список автозапчастей
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAutoPartProductList'
          description: ''
  /api/catalog/auto-parts/products/{slug}:
    get:
      operationId: catalog_auto_parts_products_retrieve
      description: API для работы с автозапчастями.
      summary: Получить детали автозапчасти
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoPartProductDetail'
          description: ''
  /api/catalog/banners:
    get:
      operationId: catalog_banners_list
      description: Возвращает список активных баннеров с медиа-файлами, отсортированных
        по позиции и порядку сортировки
      summary: Получить список баннеров
      parameters:
      - in: query
        name: position
        schema:
          type: string
          enum:
          - after_brands
          - before_footer
          - main
        description: 'Фильтр по позиции баннера: main, after_brands, before_footer'
      tags:
      - catalog
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banner'
          description: ''
  /api/catalog/banners/{id}:
    get:
      operationId: catalog_banners_retrieve
      description: API для работы с баннерами.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Баннер.
        required: true
      tags:
      - catalog
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banner'
          description: ''
  /api/catalog/books/products:
    get:
      operationId: catalog_books_products_list
      description: Возвращает список книг с возможностью фильтрации
      summary: Получить список книг
      parameters:
      - in: query
        name: author
        schema:
          type: string
        description: Автор (имя или часть)
      - in: query
        name: brand_id
        schema:
          type: integer
        description: ID бренда
      - in: query
        name: category_slug
        schema:
          type: string
        description: Slug категории
      - in: query
        name: cover_type
        schema:
          type: string
        description: Тип обложки
      - in: query
        name: genre_slug
        schema:
          type: string
        description: Slug жанра
      - in: query
        name: is_bestseller
        schema:
          type: boolean
        description: Бестселлер
      - in: query
        name: isbn
        schema:
          type: string
        description: ISBN
      - in: query
        name: language
        schema:
          type: string
        description: Язык
      - in: query
        name: ordering
        schema:
          type: string
        description: Сортировка
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: pages_max
        schema:
          type: integer
        description: Макс. страниц
      - in: query
        name: pages_min
        schema:
          type: integer
        description: Мин. страниц
      - in: query
        name: publisher
        schema:
          type: string
        description: Издательство
      - in: query
        name: rating_min
        schema:
          type: number
          format: double
        description: Мин. рейтинг
      - in: query
        name: search
        schema:
          type: string
        description: Поисковый запрос
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookProductList'
          description: ''
  /api/catalog/books/products/{slug}:
    get:
      operationId: catalog_books_products_retrieve
      description: API для работы с товарами-книгами.
      summary: Получить книгу по slug
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookProduct'
          description: ''
  /api/catalog/brands:
    get:
      operationId: catalog_brands_list
      description: Возвращает список активных брендов (можно фильтровать по типу товара
        или основной категории)
      summary: Получить список брендов
      parameters:
      - in: query
        name: category_id
        schema:
          type: integer
        description: ID категории для фильтрации по товарам
      - in: query
        name: category_slug
        schema:
          type: string
        description: Slug категории для фильтрации по товарам
      - in: query
        name: in_stock
        schema:
          type: boolean
        description: Только бренды с товарами в наличии
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: primary_category_slug
        schema:
          type: string
        description: Основная категория бренда (slug или несколько через запятую,
          например furniture)
      - in: query
        name: product_type
        schema:
          type: string
        description: Тип товара для фильтра (medicines, supplements, shoes, clothing,
          electronics, furniture и т.д.)
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBrandList'
          description: ''
  /api/catalog/brands/{id}:
    get:
      operationId: catalog_brands_retrieve
      description: Возвращает детальную информацию о бренде
      summary: Получить бренд по ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Бренд.
        required: true
      tags:
      - catalog
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
          description: ''
  /api/catalog/categories:
    get:
      operationId: catalog_categories_list
      description: Возвращает активные категории с серверной фильтрацией
      summary: Получить список категорий
      parameters:
      - in: query
