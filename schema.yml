          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        currency:
          type: string
      required:
      - currency
      - id
      - price
      - product_name
      - quantity
      - total
    OrderStatusEnum:
      enum:
      - new
      - pending_payment
      - paid
      - processing
      - shipped
      - delivered
      - cancelled
      type: string
      description: |-
        * `new` - Новый
        * `pending_payment` - Ожидает оплаты
        * `paid` - Оплачен
        * `processing` - В обработке
        * `shipped` - Отправлен
        * `delivered` - Доставлен
        * `cancelled` - Отменен
    Page:
      type: object
      description: |-
        Сериализатор, возвращающий локализованный заголовок и контент.

        Поля `title` и `content` вычисляются методами `get_title`/`get_content`, которые смотрят
        в `self.context.get('lang')` и выполняют fallback при отсутствии перевода.
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          description: Канонический slug, общий для всех локалей
          maxLength: 150
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          readOnly: true
        content:
          type: string
          readOnly: true
        is_active:
          type: boolean
          title: Опубликовано
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - slug
      - title
      - updated_at
