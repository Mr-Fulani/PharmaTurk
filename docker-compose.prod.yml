services:
  backend:
    restart: always
    environment:
      USE_RUNSERVER: 0
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
    networks:
      - default

  frontend:
    build:
      target: production
    command: npm run start
    restart: always
    # Remove direct port 80 mapping, let Nginx handle it
    environment:
      - NODE_ENV=production
    networks:
      - default

  nginx:
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    networks:
      - default

  postgres:
    restart: always
    networks:
      - default

  redis:
    restart: always
    networks:
      - default

  opensearch:
    restart: always
    networks:
      - default

  qdrant:
    restart: always
    networks:
      - default

  celeryworker:
    restart: always
    networks:
      - default

  celery_ai:
    restart: always
    networks:
      - default

  celerybeat:
    restart: always
    networks:
      - default

networks:
  default:
    driver: bridge
