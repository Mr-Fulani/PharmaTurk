services:
  backend:
    restart: always
    environment:
      USE_RUNSERVER: 0
    volumes:
      - staticfiles:/app/staticfiles
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build:
      target: production
    command: npm run start
    restart: always
    # Remove direct port 80 mapping, let Nginx handle it
    environment:
      - NODE_ENV=production
      # У контейнера нет IPv6-маршрута, а у cdn.mudaroba.com есть AAAA-записи:
      # без ipv4first оптимизатор next/image зависает на IPv6 (UND_ERR_CONNECT_TIMEOUT)
      - NODE_OPTIONS=--dns-result-order=ipv4first
    dns:
      - 8.8.8.8
      - 1.1.1.1

  nginx:
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro

  postgres:
    restart: always

  redis:
    restart: always

  opensearch:
    restart: always

  qdrant:
    restart: always

  celeryworker:
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1

  celery_ai:
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1

  celerybeat:
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
