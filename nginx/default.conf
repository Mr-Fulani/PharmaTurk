# Кэш ответов proxy-media (ресайзы карточек): снимает повторную нагрузку с Django
proxy_cache_path /var/cache/nginx/proxy_media levels=1:2 keys_zone=proxy_media:10m
                 max_size=1g inactive=30d use_temp_path=off;

# Бэкенд отдаёт webp в зависимости от Accept — учитываем в ключе кэша,
# не фрагментируя его полным значением заголовка
map $http_accept $accept_webp {
    default      "";
    "~image/webp" "webp";
}

# Кэшируем только картинки (расширение в ?path=). Видео — пасс-тру:
# его стримят Range-запросами, в кэше оно лишь вымывало бы картинки.
map $arg_path $proxy_media_skip_cache {
    default 1;
    "~*\.(jpe?g|png|webp|gif|svg|ico|avif)$" 0;
}

server {
    listen 80;
    server_name mudaroba.com www.mudaroba.com 204.168.175.164;

    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Медиа из proxy-media с кэшем на диске nginx (^~ — приоритет над regex-локацией /api)
    location ^~ /api/catalog/proxy-media {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache proxy_media;
        proxy_cache_key "$uri$is_args$args|$accept_webp";
        proxy_cache_valid 200 30d;
        # Django вешает Set-Cookie (sessionid) и Vary: Cookie даже на картинки —
        # это выключает общий кэш. Vary игнорируем (webp-вариативность уже в ключе
        # через $accept_webp), Set-Cookie прячем, чтобы кэш не раздавал чужую сессию.
        # X-Accel-Buffering: no от Django отключал буферизацию — без неё nginx
        # не кэширует; буферизация не ломает стриминг (клиент получает поток сразу).
        proxy_ignore_headers Set-Cookie Vary X-Accel-Buffering;
        proxy_hide_header Set-Cookie;
        # Мимо кэша: не-картинки (видео) и Range-запросы (стриминг)
        proxy_cache_bypass $proxy_media_skip_cache $http_range;
        proxy_no_cache $proxy_media_skip_cache $http_range;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_read_timeout 180s;
    }

    # Медиафайлы Django — напрямую в бэкенд (раньше шли двойным прокси через Next)
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Backend API and Admin
    location ~ ^/(admin|api|swagger|redoc) {
        # If accessing /admin, /api etc without trailing slash, it might 404 if APPEND_SLASH is False
        # But we want to let Django handle the internal paths.
        # Specifically for admin, let's ensure it works.
        rewrite ^/admin$ /admin/ permanent;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Дефолтная локаль (ru) живёт без префикса; Next отдаёт /ru/* как 200-дубликат
    # той же страницы — дубли попадали в индекс. Склеиваем 301-ом на URL без префикса.
    # Внутри Next это не решается: i18n-нормализация срезает префикс до middleware/redirects.
    location = /ru {
        return 301 /$is_args$args;
    }
    location ^~ /ru/ {
        rewrite ^/ru/(.*)$ /$1 permanent;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js specific headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Sitemap needs extra time (SSR fetches many API endpoints)
    location = /sitemap.xml {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }
}
