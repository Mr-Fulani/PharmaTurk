name: pharmaturk

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pharmaturk
      POSTGRES_USER: pharmaturk
      POSTGRES_PASSWORD: pharmaturk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmaturk"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=yourStrongPassword123!
      - OPENSEARCH_JAVA_OPTS=-Xms768m -Xmx768m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    mem_limit: 1.5g

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pharmaturk-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_started
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./backend:/app
      - staticfiles:/app/staticfiles
      - /app/__pycache__
      - /app/*/__pycache__
    entrypoint: ["bash", "/app/docker-entrypoint.sh"]
    mem_limit: 1.5g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    tty: true
    stdin_open: true
    env_file:
      - .env
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_DISABLE_SWC_NATIVE=1
      - INTERNAL_API_BASE=http://backend:8000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      - SITE_URL=${SITE_URL:-}
      - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      - NEXT_PUBLIC_VK_APP_ID=${NEXT_PUBLIC_VK_APP_ID:-}
    depends_on:
      backend:
        condition: service_healthy

  celeryworker:
    image: pharmaturk-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    command: bash -c "poetry run celery -A config worker -Q celery,recsys --loglevel=info --concurrency=2"
    mem_limit: 4g

  celery_ai:
    image: pharmaturk-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    command: bash -c "poetry run celery -A config worker -Q ai -n ai_worker@%h --loglevel=info --concurrency=2"
    mem_limit: 2g

  celerybeat:
    image: pharmaturk-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    command: bash -c "poetry run celery -A config beat --loglevel=info"

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  qdrant_data:
  staticfiles:
